[build]
buildCommand = "pnpm install --frozen-lockfile && pnpm turbo build --filter=@hararai/api && cd packages/db && npx drizzle-kit migrate"

[deploy]
startCommand = "node apps/api/dist/apps/api/src/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
